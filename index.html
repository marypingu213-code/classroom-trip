<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶石鑑定室 | 戶外走讀平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .font-serif { font-family: 'Noto Serif TC', serif; }
        .newspaper-container { column-gap: 2rem; orphans: 1; widows: 1; }
        .article-card { break-inside: avoid; margin-bottom: 2rem; }
        @media print { .print\:hidden { display: none !important; } body { background: white; padding: 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- 模組化載入 Firebase -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
        }
      }
    </script>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot } from 'firebase/firestore';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';

        const { useState, useEffect, useRef } = React;

        // ==========================================
        // ⚠️ 老師請注意：若要放在 GitHub 上讓多台平板互通資料，請填入您的 Firebase 金鑰
        // ==========================================
        const MY_FIREBASE_CONFIG = null; 
        const GEMINI_API_KEY = ""; 

        // 獨立初始化 Firebase，解決權限時序問題
        let appInstance, authInstance, dbInstance, resolvedAppId;
        try {
            const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : MY_FIREBASE_CONFIG;
            if (config) {
                appInstance = initializeApp(config);
                authInstance = getAuth(appInstance);
                dbInstance = getFirestore(appInstance);
                resolvedAppId = typeof __app_id !== 'undefined' ? __app_id : 'tainan-walk-app';
            }
        } catch (e) {
            console.error("Firebase init error", e);
        }

        // 基礎設定
        const DEFAULT_LOCATIONS = ['資源班', '南美館', '奇美博物館', '林百貨', '安平古堡', '台灣文學館', '文青麵店', '四草綠色隧道', '府中街', '臺灣銀行'];
        const DEFAULT_TARGETS = ['抓面磚', '顛倒的布幣花磚', 'AI 點餐系統', '萬字紋或菊花', '十三溝面磚', '日本福神臉譜', '竹筍柱或迷宮柱頭', '神桌上的食物', '外國紙幣', '馬賽克桌面', '自己發現的其他東西'];

        const SENSE_OPTIONS = [
            { id: 'see', label: '我看到了', icon: 'Eye', color: 'bg-blue-500', textColor: 'text-blue-600', lightBg: 'bg-blue-50', meta: '長得像' },
            { id: 'touch', label: '我摸到了', icon: 'Hand', color: 'bg-amber-500', textColor: 'text-amber-600', lightBg: 'bg-amber-50', meta: '摸起來像' },
            { id: 'taste', label: '我吃到了', icon: 'Utensils', color: 'bg-red-500', textColor: 'text-red-600', lightBg: 'bg-red-50', meta: '吃起來像' },
            { id: 'hear', label: '我聽到了', icon: 'Ear', color: 'bg-green-500', textColor: 'text-green-600', lightBg: 'bg-green-50', meta: '聽起來像' }
        ];

        const FEELINGS = {
            see: ['好漂亮', '好壯觀', '很特別', '亮亮的', '暗暗的', '看不懂', '太複雜', '太多看不完', '眼花撩亂', '很普通', '很有趣', '很驚喜', '有成就感', '想拍照', '沒興趣'],
            touch: ['軟綿綿', '硬硬的', '刺刺的', '粗粗的', '滑滑的', '冰冰的', '熱熱的', '濕濕的', '黏黏的', '刺痛感', '很有趣', '很驚喜', '很舒服', '想再摸一次', '沒興趣'],
            taste: ['甜甜的', '酸酸的', '辣辣的', '太鹹了', '苦苦的', '脆脆的', 'QQ的', '軟爛的', '香香的', '冰涼的', '很好吃', '沒味道', '想再吃', '很驚喜', '不想吃了'],
            hear: ['好好聽', '很輕快', '很溫柔', '很有節奏', '聽不懂', '好吵/太大聲', '太小聲', '好刺耳', '怪聲音', '很混亂', '很開心', '被嚇到', '想跟著跳', '很舒服', '沒興趣']
        };

        const LucideIcon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide && window.lucide.icons[name]) {
                    containerRef.current.innerHTML = `<i data-custom-icon="${name}"></i>`;
                    window.lucide.createIcons({
                        root: containerRef.current, nameAttr: 'data-custom-icon',
                        icons: { [name]: window.lucide.icons[name] }, attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            // 系統狀態
            const [isOffline] = useState(!appInstance);
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home');
            
            // 任務派發狀態
            const [currentMission, setCurrentMission] = useState(null); 
            const [roomCodeInput, setRoomCodeInput] = useState('');
            const [missionSetup, setMissionSetup] = useState({ name: '', date: new Date().toISOString().split('T')[0], code: '', draft: '', locations: [], targets: [] });
            const [isProcessingAI, setIsProcessingAI] = useState(false);

            // 學生紀錄狀態 
            const [studentName, setStudentName] = useState('');
            const [mode, setMode] = useState('beginner');
            const [tempBegData, setTempBegData] = useState({ see: '', touch: '', taste: '', hear: '', feelings: {}, customFeelings: { see: '', touch: '', taste: '', hear: '' } });
            const [tempAdvRecords, setTempAdvRecords] = useState([{ id: Date.now(), location: '', target: '', sense: '', obs: '', meta: '', feelings: [], customFeeling: '' }]);
            
            // 語音相關
            const [activeMic, setActiveMic] = useState(null);
            const [focusedFeeling, setFocusedFeeling] = useState(null);
            const recognitionRef = useRef(null);

            // 資料庫數據
            const [allRecords, setAllRecords] = useState([]);
            const [selectedRecords, setSelectedRecords] = useState([]);
            const [recordPhotos, setRecordPhotos] = useState({});
            const [layoutIndex, setLayoutIndex] = useState(0);

            // ==========================================
            // 權限驗證 (先等 Token 驗證完才放行)
            // ==========================================
            useEffect(() => {
                if (!authInstance) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(authInstance, __initial_auth_token);
                        } else {
                            await signInAnonymously(authInstance);
                        }
                    } catch (e) {
                        console.error("Auth init error:", e);
                    }
                };
                initAuth();
                
                const unsubscribe = onAuthStateChanged(authInstance, (u) => { 
                    setUser(u); 
                });
                return () => unsubscribe();
            }, []);

            // 資料監聽 (確保 user 存在後才觸發)
            useEffect(() => {
                if (dbInstance && user) {
                    const q = collection(dbInstance, 'artifacts', resolvedAppId, 'public', 'data', 'walk_records');
                    const unsubscribe = onSnapshot(q, (snapshot) => {
                        const recs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        recs.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                        setAllRecords(recs);
                    }, (error) => {
                        console.error("Firestore permission error (please check rules):", error);
                    });
                    return () => unsubscribe();
                } else if (isOffline) {
                    const stored = JSON.parse(localStorage.getItem('walk_records') || '[]');
                    setAllRecords(stored);
                }
            }, [user, isOffline]);

            // ==========================================
            // 語音相關邏輯 
            // ==========================================
            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    const recognition = new SpeechRecognition();
                    recognition.continuous = true; recognition.lang = 'zh-TW';
                    recognition.onresult = (e) => {
                        const transcript = e.results[e.results.length - 1][0].transcript;
                        if (activeMic) {
                            const parts = activeMic.split('_');
                            const m = parts[0];
                            const id = parts[1];
                            const field = parts[2];
                            
                            if (m === 'beg') {
                                if (field === 'customFeeling') {
                                    setTempBegData(prev => ({ ...prev, customFeelings: { ...prev.customFeelings, [id]: prev.customFeelings[id] + transcript } }));
                                } else {
                                    setTempBegData(prev => ({ ...prev, [id]: prev[id] + transcript }));
                                }
                            } else if (m === 'adv') {
                                setTempAdvRecords(prev => prev.map(r => r.id.toString() === id ? { ...r, [field]: (r[field] || '') + transcript } : r));
                            }
                        }
                    };
                    recognition.onend = () => setActiveMic(null);
                    recognitionRef.current = recognition;
                }
            }, [activeMic]);

            const handleMic = (micKey) => {
                if (activeMic === micKey) { recognitionRef.current?.stop(); setActiveMic(null); }
                else { if (activeMic) recognitionRef.current?.stop(); setActiveMic(micKey); try { recognitionRef.current?.start(); } catch(e){} }
            };

            const speakText = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text.replace('/', '，或者'));
                    utterance.lang = 'zh-TW'; utterance.rate = 0.85;
                    window.speechSynthesis.speak(utterance);
                }
            };

            // ==========================================
            // 老師開課邏輯
            // ==========================================
            const processAI = async () => {
                if (!missionSetup.draft.trim()) return;
                setIsProcessingAI(true);
                const prompt = `你是一位專業的教育公關。請根據「教學草稿」處理：1. 潤飾新聞稿。2. 精確提取【地點】與要觀察的【物件項目】。回應JSON：{"polished": "...","locations": ["地點1"...],"targets": ["物件1"...]}`;
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey || GEMINI_API_KEY}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: missionSetup.draft }] }],
                            systemInstruction: { parts: [{ text: prompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await res.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text);
                    setMissionSetup(prev => ({ ...prev, locations: result.locations, targets: result.targets }));
                    alert("AI 已經成功提取活動項目！");
                } catch (e) {
                    alert("AI 生成失敗。系統將為您帶入預設地點與項目供您修改。");
                    setMissionSetup(prev => ({ ...prev, locations: ['南美館', '林百貨', '資源班'], targets: ['十三溝面磚', '點餐系統', '抓面磚'] }));
                } finally {
                    setIsProcessingAI(false);
                }
            };

            const createMission = async () => {
                if (!missionSetup.name || !missionSetup.code) return alert("請填寫任務名稱與任務代碼");
                if (missionSetup.locations.length === 0) return alert("請先透過 AI 提取或手動設定地點與項目");

                const missionData = {
                    code: missionSetup.code, name: missionSetup.name, date: missionSetup.date,
                    locations: missionSetup.locations, targets: missionSetup.targets,
                    createdAt: new Date().toISOString()
                };

                if (dbInstance) {
                    if (!user) return alert("權限尚未準備好，請稍等一秒再試...");
                    await setDoc(doc(dbInstance, 'artifacts', resolvedAppId, 'public', 'data', 'missions', missionData.code), missionData);
                } else {
                    const storedMissions = JSON.parse(localStorage.getItem('missions') || '{}');
                    storedMissions[missionData.code] = missionData;
                    localStorage.setItem('missions', JSON.stringify(storedMissions));
                }
                
                alert(`開課成功！請請學生輸入任務代碼：${missionData.code}`);
                setView('home');
            };

            // ==========================================
            // 學生加入邏輯
            // ==========================================
            const joinMission = async () => {
                if (!roomCodeInput.trim()) return alert("請輸入任務代碼");
                
                let missionData = null;
                if (dbInstance) {
                    if (!user) return alert("連線中，請稍候...");
                    const docSnap = await getDoc(doc(dbInstance, 'artifacts', resolvedAppId, 'public', 'data', 'missions', roomCodeInput));
                    if (docSnap.exists()) missionData = docSnap.data();
                } else {
                    const storedMissions = JSON.parse(localStorage.getItem('missions') || '{}');
                    missionData = storedMissions[roomCodeInput];
                }

                if (missionData) {
                    setCurrentMission(missionData);
                    setView('student_record');
                } else {
                    alert("找不到此任務代碼，請確認老師是否已經開課！");
                }
            };

            const joinFreeExplore = () => {
                setCurrentMission({
                    code: 'FREE',
                    name: '自由探索 (免代碼)',
                    locations: DEFAULT_LOCATIONS,
                    targets: DEFAULT_TARGETS,
                    date: new Date().toISOString().split('T')[0]
                });
                setView('student_record');
            };

            // 儲存學生紀錄
            const submitRecord = async () => {
                if (!studentName) return alert("請輸入您的姓名");
                
                let essay = `【作者：${studentName}】\n\n`;
                if (mode === 'beginner') {
                    SENSE_OPTIONS.forEach(s => {
                        const combinedFeelings = [...(tempBegData.feelings[s.id] || [])];
                        if (tempBegData.customFeelings[s.id]) combinedFeelings.push(tempBegData.customFeelings[s.id]);
                        
                        if (tempBegData[s.id] || combinedFeelings.length > 0) {
                            essay += `${s.label}「${tempBegData[s.id]}」，感覺「${combinedFeelings.join('、')}」。\n`;
                        }
                    });
                } else {
                    tempAdvRecords.forEach((r, idx) => {
                        const combinedFeelings = [...r.feelings];
                        if (r.customFeeling) combinedFeelings.push(r.customFeeling);
                        
                        if (r.target) essay += `（發現 ${idx+1}）在「${r.location}」探索「${r.target}」。透過「${r.sense}」，發現了「${r.obs}」，覺得它「${r.meta}」，心情「${combinedFeelings.join('、')}」。\n\n`;
                    });
                }

                const newRec = {
                    id: Date.now().toString(),
                    missionCode: currentMission.code,
                    name: studentName,
                    mode: mode,
                    content: essay,
                    fileName: `${currentMission.date.replace(/-/g, '')}_${studentName}_${mode === 'beginner' ? '初階' : '進階'}.txt`,
                    createdAt: new Date().toISOString()
                };

                if (dbInstance) {
                    if (!user) return alert("連線中，請稍候...");
                    await setDoc(doc(dbInstance, 'artifacts', resolvedAppId, 'public', 'data', 'walk_records', newRec.id), newRec);
                } else {
                    const stored = JSON.parse(localStorage.getItem('walk_records') || '[]');
                    localStorage.setItem('walk_records', JSON.stringify([newRec, ...stored]));
                    setAllRecords([newRec, ...stored]);
                }

                alert("紀錄已成功送入老師的資料庫！太棒了！");
                setStudentName('');
                setTempBegData({ see: '', touch: '', taste: '', hear: '', feelings: {}, customFeelings: { see: '', touch: '', taste: '', hear: '' } });
                setTempAdvRecords([{ id: Date.now(), location: currentMission.locations[0] || '', target: '', sense: '', obs: '', meta: '', feelings: [], customFeeling: '' }]);
                setView('home');
            };

            const enterDashboard = () => {
                if (!roomCodeInput.trim()) return alert("請輸入任務代碼");
                setCurrentMission({ code: roomCodeInput }); 
                setView('teacher_dashboard');
            };
            
            const enterDashboardAll = () => {
                setCurrentMission({ code: 'ALL', name: '所有紀錄' }); 
                setView('teacher_dashboard');
            };

            // ==========================================
            // 視圖渲染區塊
            // ==========================================
            
            if (view === 'home') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 relative">
                    {isOffline && <div className="absolute top-0 left-0 right-0 bg-amber-100 text-amber-800 text-center py-2 font-bold text-sm">⚠️ 目前為單機模式（無資料庫）。資料僅存在這台平板中，若要跨平板傳輸，請在程式碼中填寫 Firebase 設定。</div>}
                    
                    <div className="text-center mb-12">
                        <div className="bg-indigo-600 text-white p-4 rounded-full w-24 h-24 flex items-center justify-center mx-auto mb-6 shadow-xl shadow-indigo-200"><LucideIcon name="Gem" size={48} /></div>
                        {/* 修改標題：拆為兩行，徹底解決「室外」誤會 */}
                        <h1 className="font-black tracking-tight mb-6 text-center leading-tight">
                            <span className="block text-5xl md:text-6xl text-indigo-700 mb-2">寶石鑑定室</span>
                            <span className="block text-3xl md:text-4xl text-slate-700">戶外走讀平台</span>
                        </h1>
                        <p className="text-xl text-slate-500 font-medium">任務派發、紀錄與電子報系統</p>
                    </div>

                    <div className="grid md:grid-cols-3 gap-6 w-full max-w-5xl">
                        <button onClick={() => setView('teacher_create')} className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 hover:shadow-xl hover:-translate-y-2 transition-all group text-left relative overflow-hidden">
                            <div className="bg-emerald-100 text-emerald-600 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform"><LucideIcon name="PenTool" size={32}/></div>
                            <h2 className="text-2xl font-black text-slate-800 mb-2">1. 老師開課</h2>
                            <p className="text-slate-500">輸入教學計畫，獲取任務代碼派發給學生。</p>
                        </button>
                        <div className="bg-indigo-600 p-8 rounded-3xl shadow-lg shadow-indigo-200 flex flex-col justify-between group text-left relative overflow-hidden">
                            <div>
                                <div className="bg-white/20 text-white w-16 h-16 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform"><LucideIcon name="Users" size={32}/></div>
                                <h2 className="text-2xl font-black text-white mb-2">2. 學生加入</h2>
                                <p className="text-indigo-100 mb-6">輸入老師提供的任務代碼，開始感官紀錄。</p>
                            </div>
                            <div className="space-y-3">
                                <button onClick={() => setView('student_join')} className="w-full bg-white text-indigo-600 py-3 rounded-xl font-bold shadow-md hover:bg-indigo-50 transition-colors">輸入任務代碼</button>
                                <button onClick={joinFreeExplore} className="w-full bg-indigo-500 text-white py-3 rounded-xl font-bold border border-indigo-400 hover:bg-indigo-400 transition-colors">免代碼直接進入</button>
                            </div>
                        </div>
                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col justify-between group text-left relative overflow-hidden">
                            <div>
                                <div className="bg-amber-100 text-amber-600 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform"><LucideIcon name="Database" size={32}/></div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2">3. 老師後台</h2>
                                <p className="text-slate-500 mb-6">檢視學生的繳交紀錄，生成特刊電子報。</p>
                            </div>
                            <div className="space-y-3">
                                <button onClick={() => setView('teacher_login')} className="w-full bg-slate-800 text-white py-3 rounded-xl font-bold shadow-md hover:bg-slate-700 transition-colors">輸入任務代碼</button>
                                <button onClick={enterDashboardAll} className="w-full bg-white text-slate-600 py-3 rounded-xl font-bold border border-slate-200 hover:bg-slate-50 transition-colors">檢視所有歷史紀錄</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (view === 'teacher_create') return (
                <div className="max-w-4xl mx-auto p-6">
                    <button onClick={() => setView('home')} className="mb-6 flex items-center text-slate-500 hover:text-indigo-600 font-bold"><LucideIcon name="ArrowLeft" className="mr-2"/> 返回首頁</button>
                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 mb-8">
                        <h2 className="text-3xl font-black text-slate-800 mb-6 flex items-center"><LucideIcon name="PenTool" className="mr-3 text-emerald-600" size={32}/> 新增走讀任務</h2>
                        <div className="grid md:grid-cols-3 gap-4 mb-6">
                            <div><label className="block text-sm font-bold text-slate-500 mb-2">任務名稱</label><input type="text" value={missionSetup.name} onChange={e=>setMissionSetup({...missionSetup, name: e.target.value})} placeholder="例：林百貨走讀" className="w-full bg-slate-50 p-4 rounded-xl border focus:border-indigo-500 outline-none font-bold" /></div>
                            <div><label className="block text-sm font-bold text-slate-500 mb-2">任務代碼 (學生加入用)</label><input type="text" value={missionSetup.code} onChange={e=>setMissionSetup({...missionSetup, code: e.target.value})} placeholder="例：0422" className="w-full bg-slate-50 p-4 rounded-xl border focus:border-indigo-500 outline-none font-black text-indigo-600 uppercase" /></div>

                                </tbody>
                            </table>
                            {taskRecords.length === 0 && <div className="p-20 text-center text-slate-300 font-bold">沒有符合的學生紀錄喔！</div>}
                        </div>
                    </div>
                );
            }

            if (view === 'newsletter') {
                const articles = allRecords.filter(r => selectedRecords.includes(r.id));
                return (
                    <div className="min-h-screen bg-stone-100 p-4 md:p-12 font-serif">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex justify-between items-center mb-10 print:hidden">
                                <button onClick={() => setView('teacher_dashboard')} className="bg-white px-6 py-2 rounded-xl flex items-center font-sans shadow-md hover:bg-slate-50 transition-all"><LucideIcon name="ArrowLeft" className="mr-2"/> 返回資料庫</button>
                                <div className="flex gap-3">
                                    <button onClick={() => setLayoutIndex((layoutIndex + 1) % 3)} className="bg-amber-500 text-white px-6 py-2 rounded-xl flex items-center font-sans shadow-md hover:bg-amber-600 transition-all"><LucideIcon name="RefreshCw" className="mr-2"/> 🔄 重整版面 (變換樣式)</button>
                                    <button onClick={() => window.print()} className="bg-indigo-600 text-white px-6 py-2 rounded-xl flex items-center font-sans shadow-md hover:bg-indigo-700 transition-all"><LucideIcon name="Printer" className="mr-2"/> 列印 / 下載 PDF</button>
                                </div>
                            </div>
                            <div className="bg-white p-8 md:p-16 shadow-2xl border border-stone-300 print:shadow-none print:p-0">
                                <div className="border-b-8 border-double border-black text-center pb-8 mb-12">
                                    <h1 className="text-6xl font-black mb-3">寶石小偵探特刊</h1>
                                    <p className="text-xl text-stone-600 uppercase tracking-[0.4em] font-sans">{currentMission?.code === 'ALL' ? '全集' : currentMission?.code} • {new Date().toLocaleDateString()}</p>
                                </div>
                                <div className={`newspaper-container ${layoutIndex === 0 ? 'columns-1 md:columns-2' : layoutIndex === 1 ? 'flex flex-col gap-12' : 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6'}`}>
                                    {articles.map((art, idx) => {
                                        const photos = (recordPhotos[art.id] || []).filter(p => p.selected);
                                        const isFeatured = layoutIndex === 2 && idx === 0;
                                        return (
                                            <div key={art.id} className={`article-card p-6 bg-stone-50 border-t-4 border-stone-800 shadow-sm relative ${isFeatured ? 'md:col-span-full bg-white border-l-8 border-t-0 border-indigo-900 shadow-xl' : ''}`}>
                                                <div className={`absolute top-0 left-0 w-full h-1 ${art.mode === 'beginner' ? 'bg-emerald-600' : 'bg-indigo-800'}`}></div>
                                                <h3 className={`${isFeatured ? 'text-4xl' : 'text-2xl'} font-black mb-4 leading-tight`}>【{art.name}】的感官發現</h3>
                                                {photos.length > 0 && <div className={`mb-6 flex flex-wrap gap-2 ${isFeatured ? 'justify-center' : ''}`}>{photos.map(p => <img key={p.id} src={p.url} className={`${isFeatured ? 'h-80 w-auto' : 'h-40 w-full'} object-cover rounded border-2 border-white shadow-md`}/>)}</div>}
                                                <p className={`text-stone-800 leading-relaxed font-sans ${isFeatured ? 'text-xl' : 'text-base'} whitespace-pre-wrap`}>{art.content.split('\n\n').slice(1).join('\n\n')}</p>
                                                <div className="mt-4 pt-4 border-t border-stone-200 flex justify-between items-center italic text-[10px] text-stone-400"><span>版別：{art.mode === 'beginner' ? '初階版' : '深度進階版'}</span><span>代碼：{art.missionCode || '自由'}</span></div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
