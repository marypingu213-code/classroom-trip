<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶石鑑定室 | 戶外走讀平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        .font-serif { font-family: 'Noto Serif TC', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* A3 實體報紙畫布引擎 */
        .paper-a3 {
            width: 420mm;
            min-height: 297mm;
            margin: 20px auto;
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            padding: 18mm;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }
        
        /* 報紙欄位設定 */
        .news-columns { 
            column-count: 4; 
            column-gap: 10mm; 
            orphans: 1; 
            widows: 1; 
            height: 100%;
        }
        .vertical-text { 
            writing-mode: vertical-rl; 
            text-orientation: upright;
            letter-spacing: 0.1em;
        }
        
        /* 文章防斷裂與間距 */
        .article-card { 
            break-inside: avoid; 
            page-break-inside: avoid;
            margin-bottom: 8mm; 
            position: relative;
        }

        .col-span-all {
            column-span: all;
            margin-bottom: 10mm;
        }

        /* 圖片環繞文字設定 */
        .img-float-left { float: left; margin-right: 4mm; margin-bottom: 2mm; }
        .img-float-right { float: right; margin-left: 4mm; margin-bottom: 2mm; }

        @media print { 
            @page { size: A3 landscape; margin: 0; }
            body { background: white; padding: 0; margin: 0; } 
            .print\:hidden { display: none !important; } 
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .paper-a3 {
                width: 420mm !important;
                height: 297mm !important;
                margin: 0 !important;
                padding: 15mm !important;
                box-shadow: none !important;
                border: none !important;
            }
            .a3-fold-line { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
        }
      }
    </script>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc } from 'firebase/firestore';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';

        const { useState, useEffect, useRef } = React;

        // --- 常數定義 ---
        const DEFAULT_LOCATIONS = ['資源班', '南美館', '奇美博物館', '林百貨', '安平古堡', '台灣文學館', '文青麵店', '四草綠色隧道', '府中街', '臺灣銀行'];
        const DEFAULT_TARGETS = ['抓面磚', '顛倒的布幣花磚', 'AI 點餐系統', '萬字紋或菊花', '十三溝面磚', '日本福神臉譜', '竹筍柱或迷宮柱頭', '神桌上的食物', '外國紙幣', '馬賽克桌面', '自己發現的其他東西'];

        const SENSE_OPTIONS = [
            { id: 'see', label: '我看到了', icon: 'Eye', color: 'bg-blue-500', textColor: 'text-blue-600', lightBg: 'bg-blue-50', meta: '長得像' },
            { id: 'touch', label: '我摸到了', icon: 'Hand', color: 'bg-amber-500', textColor: 'text-amber-600', lightBg: 'bg-amber-50', meta: '摸起來像' },
            { id: 'taste', label: '我吃到了', icon: 'Utensils', color: 'bg-red-500', textColor: 'text-red-600', lightBg: 'bg-red-50', meta: '吃起來像' },
            { id: 'hear', label: '我聽到了', icon: 'Ear', color: 'bg-green-500', textColor: 'text-green-600', lightBg: 'bg-green-50', meta: '聽起來像' }
        ];

        const FEELINGS = {
            see: ['好漂亮', '好壯觀', '很特別', '亮亮的', '暗暗的', '看不懂', '太複雜', '太多看不完', '眼花撩亂', '很普通', '很有趣', '很驚喜', '有成就感', '想拍照', '沒興趣'],
            touch: ['軟綿綿', '硬硬的', '刺刺的', '粗粗的', '滑滑的', '冰冰的', '熱熱的', '濕濕的', '黏黏的', '刺痛感', '很有趣', '很驚喜', '很舒服', '想再摸一次', '沒興趣'],
            taste: ['甜甜的', '酸酸的', '辣辣的', '太鹹了', '苦估的', '脆脆的', 'QQ的', '軟爛的', '香香的', '冰涼的', '很好吃', '沒味道', '想再吃', '很驚喜', '不想吃了'],
            hear: ['好好聽', '很輕快', '很溫柔', '很有節奏', '聽不懂', '好吵/太大聲', '太小聲', '好刺耳', '怪聲音', '很混亂', '很開心', '被嚇到', '想跟著跳', '很舒服', '沒興趣']
        };

        // --- 組件定義 ---
        const LucideIcon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide && window.lucide.icons[name]) {
                    containerRef.current.innerHTML = `<i data-custom-icon="${name}"></i>`;
                    window.lucide.createIcons({
                        root: containerRef.current, nameAttr: 'data-custom-icon',
                        icons: { [name]: window.lucide.icons[name] }, attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        // --- Firebase 初始化 ---
        const MY_FIREBASE_CONFIG = {
            apiKey: "AIzaSyC3zxvUPk1BGS6kTmlaSCRoIQtrDxREXd8",
            authDomain: "tainan-walk-app.firebaseapp.com",
            projectId: "tainan-walk-app",
            storageBucket: "tainan-walk-app.firebasestorage.app",
            messagingSenderId: "129998651381",
            appId: "1:129998651381:web:e4e590897dbc36474a2abc",
            measurementId: "G-1DY86P0Y1Y"
        };

        const app = initializeApp(MY_FIREBASE_CONFIG);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const resolvedAppId = 'tainan-walk-app';

        // --- 圖片壓縮 ---
        const compressImage = (file, callback) => {
            if (!file) return;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    const MAX_SIZE = 800; 
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.7)); 
                };
            };
        };

        function App() {
            const [isOffline, setIsOffline] = useState(false);
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home');
            const [pageUrl, setPageUrl] = useState('');
            const [currentMission, setCurrentMission] = useState(null); 
            const [studentName, setStudentName] = useState('');
            const [mode, setMode] = useState('beginner');
            const [tempBegData, setTempBegData] = useState({ see: '', touch: '', taste: '', hear: '', feelings: {}, customFeelings: { see: '', touch: '', taste: '', hear: '' }, photos: { see: null, touch: null, taste: null, hear: null } });
            const [tempAdvRecords, setTempAdvRecords] = useState([{ id: Date.now(), location: '南美館', target: '', sense: '', obs: '', meta: '', feelings: [], customFeeling: '', photo: null }]);
            const [allRecords, setAllRecords] = useState([]);
            const [selectedRecords, setSelectedRecords] = useState([]);
            const [recordPhotos, setRecordPhotos] = useState({});
            const [generatedEssay, setGeneratedEssay] = useState('');

            // 報紙自訂狀態
            const [themeStyle, setThemeStyle] = useState('retro-color'); 
            const [newspaperTitle, setNewspaperTitle] = useState('寶石鑑定室活動報');
            const [newspaperTitleSize, setNewspaperTitleSize] = useState('text-7xl');
            const [newspaperDate, setNewspaperDate] = useState(new Date().toISOString().split('T')[0]);
            const [newspaperTaskLabel, setNewspaperTaskLabel] = useState('總編輯：老師');
            const [articleOverrides, setArticleOverrides] = useState({}); 

            const [editingRecordId, setEditingRecordId] = useState(null);
            const [editingContent, setEditingContent] = useState('');

            useEffect(() => {
                setPageUrl(window.location.href.split('#')[0]);
                signInAnonymously(auth).catch(() => setIsOffline(true));
                onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (user && !isOffline) {
                    const q = collection(db, 'artifacts', resolvedAppId, 'public', 'data', 'walk_records');
                    return onSnapshot(q, (sn) => setAllRecords(sn.docs.map(d => ({ id: d.id, ...d.data() }))));
                }
            }, [user, isOffline]);

            const handlePreview = () => {
                if (!studentName) return alert("請輸入姓名");
                let essay = `【作者：${studentName}】\n\n`;
                if (mode === 'beginner') {
                    ['see', 'touch', 'taste', 'hear'].forEach(s => {
                        const feelings = (tempBegData.feelings[s] || []).join('、');
                        if (tempBegData[s]) essay += `${s === 'see' ? '我看到了' : s === 'touch' ? '我摸到了' : s === 'taste' ? '我吃到了' : '我聽到了'}「${tempBegData[s]}」，感覺「${feelings}」。\n`;
                    });
                } else {
                    tempAdvRecords.forEach((r, i) => { if(r.obs) essay += `（發現 ${i+1}）在「${r.location}」探索「${r.target}」。透過「${r.sense}」，發現了「${r.obs}」，覺得它「${r.meta}」，心情「${r.feelings.join('、')}」。\n\n`; });
                }
                setGeneratedEssay(essay);
                setView('preview_modal');
            };

            const submitRecord = async () => {
                let photos = mode === 'beginner' ? Object.values(tempBegData.photos).filter(x => x) : tempAdvRecords.map(r => r.photo).filter(x => x);
                const data = { id: Date.now().toString(), name: studentName, mode, content: generatedEssay, studentPhotos: photos, createdAt: new Date().toISOString() };
                if (!isOffline) await setDoc(doc(db, 'artifacts', resolvedAppId, 'public', 'data', 'walk_records', data.id), data);
                alert("已成功送出！");
                setView('home');
            };

            if (view === 'home') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 relative bg-slate-50">
                    <div className="text-center mb-12">
                        <div className="bg-indigo-600 text-white p-4 rounded-full w-20 h-20 flex items-center justify-center mx-auto mb-6 shadow-xl"><LucideIcon name="Gem" size={40} /></div>
                        <h1 className="font-black text-6xl text-indigo-700 mb-2">寶石鑑定室</h1>
                        <h1 className="font-black text-4xl text-slate-700 mb-8">戶外走讀平台</h1>
                        <div className="flex gap-4">
                            <button onClick={() => setView('student_join')} className="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold text-xl shadow-lg hover:bg-indigo-700 transition-all">學生加入</button>
                            <button onClick={() => setView('teacher_dashboard')} className="bg-slate-800 text-white px-8 py-4 rounded-2xl font-bold text-xl shadow-lg hover:bg-slate-900 transition-all">老師後台</button>
                        </div>
                    </div>
                    <div className="flex flex-col items-center bg-white p-4 rounded-3xl shadow-md border border-slate-100">
                        <p className="text-xs font-bold text-indigo-600 mb-2">掃碼開啟平台</p>
                        <img src={`https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(pageUrl)}`} className="w-24 h-24" />
                    </div>
                </div>
            );

            if (view === 'student_join') return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-indigo-600 p-6">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md text-center">
                        <h2 className="text-3xl font-black mb-8">開始你的任務</h2>
                        <input type="text" value={studentName} onChange={e => setStudentName(e.target.value)} placeholder="請輸入姓名" className="w-full bg-slate-50 border-2 rounded-2xl p-4 text-center text-xl font-bold mb-6" />
                        <button onClick={() => setView('student_record')} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xl">進入感官紀錄室</button>
                        <button onClick={() => setView('home')} className="mt-4 text-slate-400 font-bold">返回首頁</button>
                    </div>
                </div>
            );

            if (view === 'student_record') return (
                <div className="max-w-4xl mx-auto p-4 pb-32">
                    <header className="bg-white p-8 rounded-3xl shadow-sm text-center mb-8">
                        <h1 className="text-3xl font-black mb-6 italic text-indigo-600">寶石鑑定小偵探紀錄室</h1>
                        <p className="text-slate-500 font-bold">你好，{studentName}！今天發現了什麼呢？</p>
                    </header>
                    <div className="space-y-6">
                        {SENSE_OPTIONS.map(s => (
                            <div key={s.id} className="bg-white rounded-3xl border-2 border-slate-100 overflow-hidden shadow-sm flex flex-col md:flex-row">
                                <div className="md:w-1/2 p-6 flex flex-col">
                                    <div className="flex items-center mb-4"><div className={`${s.lightBg} p-2 rounded-xl mr-3`}><LucideIcon name={s.icon} className={s.textColor}/></div><h3 className={`text-xl font-black ${s.textColor}`}>{s.label}</h3></div>
                                    <label className="flex flex-col items-center justify-center w-full h-40 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl cursor-pointer mb-4 overflow-hidden relative">
                                        {tempBegData.photos[s.id] ? <img src={tempBegData.photos[s.id]} className="w-full h-full object-cover" /> : <div className="flex flex-col items-center text-slate-300"><LucideIcon name="Camera" size={32}/><span className="text-xs font-bold mt-1">拍一張照片提示自己</span></div>}
                                        <input type="file" accept="image/*" hidden onChange={e => e.target.files[0] && compressImage(e.target.files[0], url => setTempBegData(p => ({...p, photos: {...p.photos, [s.id]: url}})))} />
                                    </label>
                                    <textarea value={tempBegData[s.id]} onChange={e => setTempBegData({...tempBegData, [s.id]: e.target.value})} className="w-full flex-grow bg-slate-50 rounded-xl p-3 border-none outline-none text-slate-700 font-bold" placeholder="寫下你的觀察..." />
                                </div>
                                <div className="md:w-1/2 p-6 bg-slate-50 flex flex-col">
                                    <p className="text-xs font-black text-slate-400 mb-3 flex items-center"><LucideIcon name="Heart" size={14} className="mr-1 text-pink-500"/>我的感覺是：</p>
                                    <div className="grid grid-cols-3 gap-2">
                                        {FEELINGS[s.id].map(f => (
                                            <button key={f} onClick={() => {
                                                const cur = tempBegData.feelings[s.id] || [];
                                                setTempBegData({...tempBegData, feelings: {...tempBegData.feelings, [s.id]: cur.includes(f) ? cur.filter(x => x!==f) : [...cur, f]}});
                                            }} className={`px-2 py-2 rounded-xl text-xs font-bold border transition-all ${tempBegData.feelings[s.id]?.includes(f) ? 'bg-pink-500 text-white border-transparent' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>{f}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md flex justify-center z-50 shadow-lg">
                        <button onClick={handlePreview} className="max-w-4xl w-full bg-indigo-600 text-white font-black py-4 rounded-2xl text-xl shadow-xl active:scale-95 transition-transform">預覽並完成任務</button>
                    </div>
                </div>
            );

            if (view === 'preview_modal') return (
                <div className="fixed inset-0 bg-slate-900/90 z-[100] flex items-center justify-center p-6 backdrop-blur-md">
                    <div className="bg-white rounded-[3rem] max-w-xl w-full p-10 flex flex-col max-h-[85vh] shadow-2xl">
                        <div className="text-center mb-6">
                            <div className="bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><LucideIcon name="Check" size={32} className="text-emerald-600" /></div>
                            <h2 className="text-3xl font-black">這是你今天的回憶！</h2>
                        </div>
                        <div className="bg-amber-50 p-6 rounded-3xl mb-8 overflow-y-auto flex-grow shadow-inner border-2 border-amber-100">
                            <p className="whitespace-pre-wrap text-xl font-bold leading-relaxed text-slate-700">{generatedEssay}</p>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={() => setView('student_record')} className="flex-1 py-4 rounded-2xl bg-slate-100 font-bold text-slate-500 hover:bg-slate-200">修改一下</button>
                            <button onClick={submitRecord} className="flex-1 py-4 rounded-2xl bg-indigo-600 text-white font-black shadow-xl hover:bg-indigo-700">這太棒了，送出！</button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'teacher_dashboard') return (
                <div className="max-w-6xl mx-auto p-8 pb-32">
                    <div className="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                        <div className="flex items-center"><LucideIcon name="Database" size={28} className="text-indigo-600 mr-4"/><div><h1 className="text-2xl font-black text-slate-800">老師任務後台</h1><p className="text-xs text-slate-400 font-bold">點選學生作品，生成 A3 實體報紙特刊</p></div></div>
                        <div className="flex gap-3">
                            <button onClick={() => setView('home')} className="px-5 py-2.5 rounded-xl border font-bold text-slate-500 hover:bg-slate-50">回首頁</button>
                            <button onClick={() => setView('newsletter')} disabled={selectedRecords.length === 0} className="px-6 py-2.5 rounded-xl bg-indigo-600 text-white font-black shadow-md hover:bg-indigo-700 transition-colors disabled:bg-slate-200">生成 A3 特刊報紙 ({selectedRecords.length})</button>
                        </div>
                    </div>
                    <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 text-slate-400 text-xs font-bold uppercase tracking-widest border-b border-slate-100">
                                <tr><th className="p-4 w-12 text-center">選取</th><th className="p-4 font-black">學生姓名</th><th className="p-4 font-black">內容摘要與編輯</th></tr>
                            </thead>
                            <tbody className="divide-y divide-slate-50">
                                {allRecords.map(rec => (
                                    <tr key={rec.id} className="hover:bg-indigo-50/30 transition-colors">
                                        <td className="p-4 text-center"><input type="checkbox" checked={selectedRecords.includes(rec.id)} onChange={e => e.target.checked ? setSelectedRecords([...selectedRecords, rec.id]) : setSelectedRecords(selectedRecords.filter(id => id !== rec.id))} className="w-5 h-5 accent-indigo-600 cursor-pointer" /></td>
                                        <td className="p-4 font-black text-lg text-slate-800">{rec.name}</td>
                                        <td className="p-4">
                                            <div className="flex flex-col gap-4">
                                                <div className="flex gap-2">
                                                    {(rec.studentPhotos || []).map((url, i) => <img key={i} src={url} className="w-12 h-12 object-cover rounded-lg border shadow-sm" />)}
                                                </div>
                                                <div className="relative group">
                                                    <div className="whitespace-pre-wrap leading-relaxed italic text-slate-500 text-sm bg-slate-50/50 p-4 rounded-2xl border border-slate-100">{(editingRecordId === rec.id) ? <textarea value={editingContent} onChange={e=>setEditingContent(e.target.value)} className="w-full min-h-[100px] bg-white border-2 border-indigo-200 rounded-xl p-3 outline-none" /> : (rec.content || rec.essay)}</div>
                                                    <div className="absolute top-2 right-2 flex gap-1">
                                                        {(editingRecordId === rec.id) ? (
                                                            <button onClick={async () => { await updateDoc(doc(db, 'artifacts', resolvedAppId, 'public', 'data', 'walk_records', rec.id), {content: editingContent}); setEditingRecordId(null); }} className="bg-emerald-500 text-white p-2 rounded-lg shadow-md"><LucideIcon name="Save" size={16}/></button>
                                                        ) : (
                                                            <button onClick={() => { setEditingRecordId(rec.id); setEditingContent(rec.content || rec.essay); }} className="bg-white/80 text-indigo-600 p-2 rounded-lg shadow-sm border border-indigo-100 hover:bg-white"><LucideIcon name="Edit" size={16}/></button>
                                                        )}
                                                        <button onClick={async () => { if(confirm("確定刪除？")) await deleteDoc(doc(db, 'artifacts', resolvedAppId, 'public', 'data', 'walk_records', rec.id)); }} className="bg-white/80 text-red-500 p-2 rounded-lg shadow-sm border border-red-100 hover:bg-white"><LucideIcon name="Trash2" size={16}/></button>
                                                    </div>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );

            if (view === 'newsletter') {
                const articles = allRecords.filter(r => selectedRecords.includes(r.id));
                const d = new Date(newspaperDate);
                const rocYear = d.getFullYear() - 1911;
                const isColor = themeStyle === 'retro-color';

                return (
                    <div className="min-h-screen bg-stone-200 p-4 md:p-12 font-serif">
                        <div className="max-w-6xl mx-auto mb-8 print:hidden flex flex-col gap-6 bg-white/95 p-8 rounded-[2rem] shadow-xl border-4 border-indigo-600 sticky top-4 z-[100] backdrop-blur-sm">
                            <div className="flex justify-between items-center flex-wrap gap-4 border-b-2 border-slate-100 pb-4">
                                <div className="flex items-center gap-4">
                                    <button onClick={() => setView('teacher_dashboard')} className="bg-slate-100 p-3 rounded-2xl text-slate-600 hover:bg-slate-200 transition-all"><LucideIcon name="ArrowLeft" size={24}/></button>
                                    <span className="font-sans font-black text-2xl text-slate-800">報紙編輯控制台</span>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => { setThemeStyle(t => t==='retro-color'?'retro-bw':t==='retro-bw'?'modern':'retro-color') }} className="bg-emerald-500 text-white px-6 py-3 rounded-2xl font-black shadow-lg flex items-center hover:bg-emerald-600"><LucideIcon name="Palette" className="mr-2" size={20}/> 切換風格</button>
                                    <button onClick={() => window.print()} className="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-black shadow-xl flex items-center text-xl hover:scale-105 transition-all"><LucideIcon name="Printer" className="mr-2" size={24}/> 列印 A3</button>
                                </div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 font-sans">
                                <div><label className="text-xs font-black text-slate-400 block mb-2 font-black">報紙大標題 (支援 Enter 與 空格)：</label>
                                    <textarea value={newspaperTitle} onChange={e=>setNewspaperTitle(e.target.value)} className="w-full bg-slate-50 border-2 border-slate-200 rounded-xl p-3 font-bold text-slate-700 h-20 outline-none focus:border-indigo-500" />
                                </div>
                                <div className="space-y-4">
                                    <div><label className="text-xs font-black text-slate-400 block mb-2 font-black">標題字體大小：</label>
                                        <select value={newspaperTitleSize} onChange={e=>setNewspaperTitleSize(e.target.value)} className="w-full bg-slate-50 border-2 border-slate-200 rounded-xl p-3 font-bold outline-none">
                                            <option value="text-6xl">小 (6XL)</option><option value="text-7xl">中 (7XL)</option><option value="text-8xl">大 (8XL)</option><option value="text-9xl">巨 (9XL)</option>
                                        </select>
                                    </div>
                                    <div><label className="text-xs font-black text-slate-400 block mb-2 font-black">發行日期：</label>
                                        <input type="date" value={newspaperDate} onChange={e=>setNewspaperDate(e.target.value)} className="w-full bg-slate-50 border-2 border-slate-200 rounded-xl p-3 font-bold outline-none" />
                                    </div>
                                </div>
                                <div><label className="text-xs font-black text-slate-400 block mb-2 font-black">標籤/總編輯：</label>
                                    <input type="text" value={newspaperTaskLabel} onChange={e=>setNewspaperTaskLabel(e.target.value)} className="w-full bg-slate-50 border-2 border-slate-200 rounded-xl p-3 font-bold outline-none" />
                                    <div className="mt-4 p-3 bg-indigo-50 rounded-xl border border-indigo-100 text-[10px] text-indigo-700 font-bold leading-relaxed">💡 提示：滑鼠移到照片上點擊「LEFT/RIGHT」按鈕，可進行文繞圖排版！</div>
                                </div>
                            </div>
                        </div>

                        <div className="w-full overflow-x-auto pb-20">
                            <div className={`paper-a3 print-exact ${themeStyle === 'retro-bw' ? 'grayscale contrast-125' : ''}`}>
                                <div className="a3-fold-line absolute top-0 bottom-0 left-1/2 border-l-2 border-dashed border-slate-300 opacity-50 z-0 pointer-events-none"></div>

                                <div className="relative z-10 h-full">
                                    <div className={`border-t-[12px] border-b-4 border-black border-double py-8 mb-10 flex justify-between items-end col-span-all ${themeStyle === 'retro-color' ? 'border-t-red-700 border-b-red-700' : ''}`}>
                                        <div className="flex flex-col">
                                            <span className="text-black font-black text-sm tracking-[0.4em] mb-3 px-1 font-sans">中華民國 {rocYear} 年 {d.getMonth()+1} 月 {d.getDate()} 日</span>
                                            <h1 className={`${newspaperTitleSize} font-black tracking-tight leading-none whitespace-pre-wrap ${themeStyle === 'retro-color' ? 'text-red-700' : 'text-black'}`} style={{ fontFamily: "'Noto Serif TC', serif" }}>{newspaperTitle}</h1>
                                        </div>
                                        <div className={`text-right border-l-4 pl-6 pb-2 shrink-0 ${themeStyle === 'retro-color' ? 'border-red-700' : 'border-black'}`}>
                                            <p className="text-black font-black text-lg tracking-widest uppercase mb-2 font-black">{newspaperTaskLabel}</p>
                                            <div className="h-10 w-32 flex gap-[2px] ml-auto">
                                                {Array.from({length: 20}).map((_, i) => <div key={i} className={`h-full bg-black ${i % 3 === 0 ? 'w-2' : i % 5 === 0 ? 'w-1' : 'w-0.5'}`}></div>)}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="news-columns">
                                        {articles.map((art, idx) => {
                                            const stuPhotos = (art.studentPhotos || []).map((url, i) => ({ id: `stu_${i}`, url, selected: true }));
                                            const teaPhotos = (recordPhotos[art.id] || []).filter(p => p.selected);
                                            const photos = [...stuPhotos, ...teaPhotos];

                                            const currentTitle = articleOverrides[art.id]?.title ?? `【${art.name}】的觀察紀錄`;
                                            const currentTitleSize = articleOverrides[art.id]?.titleSize ?? 'text-2xl';
                                            const isSpanAll = articleOverrides[art.id]?.spanAll ?? (idx === 0);

                                            let displayContent = (art.content || art.essay || '').split('\n\n').slice(1).join('\n\n');

                                            return (
                                                <div key={art.id} className={`article-card bg-transparent border-b-2 border-black pb-8 relative ${isSpanAll ? 'col-span-all border-b-4 border-black mb-10' : ''}`}>
                                                    <div className="print:hidden absolute -top-10 left-0 bg-indigo-50 border border-indigo-200 rounded-lg p-1.5 flex gap-2 items-center text-[10px] shadow-sm z-50">
                                                        <input type="text" value={currentTitle} onChange={e => setArticleOverrides(p => ({...p, [art.id]: {...(p[art.id]||{}), title: e.target.value}}))} className="px-2 py-0.5 rounded border border-indigo-100 w-32 font-bold" />
                                                        <select value={currentTitleSize} onChange={e => setArticleOverrides(p => ({...p, [art.id]: {...(p[art.id]||{}), titleSize: e.target.value}}))} className="rounded border border-indigo-100 font-bold">
                                                            <option value="text-xl">XL</option><option value="text-2xl">2XL</option><option value="text-3xl">3XL</option><option value="text-4xl">4XL</option><option value="text-5xl">5XL</option><option value="text-6xl">6XL</option>
                                                        </select>
                                                        <button onClick={() => setArticleOverrides(p => ({...p, [art.id]: {...(p[art.id]||{}), spanAll: !isSpanAll}}))} className={`px-2 py-0.5 rounded font-black ${isSpanAll ? 'bg-indigo-600 text-white' : 'text-indigo-600'}`}>{isSpanAll ? '橫跨中' : '跨全版'}</button>
                                                    </div>

                                                    <div className={`flex ${isSpanAll ? 'flex-row-reverse gap-10' : 'flex-col gap-4'}`}>
                                                        <div className={`shrink-0 ${isSpanAll ? 'border-l-4 border-black pl-8 flex items-start' : 'border-b border-black pb-2'}`}>
                                                            <h2 className={`font-black font-serif leading-tight ${isSpanAll ? 'vertical-text max-h-96' : ''} ${currentTitleSize} ${themeStyle === 'retro-color' ? 'text-blue-900' : 'text-black'}`}>{currentTitle}</h2>
                                                            {isSpanAll && <span className={`vertical-text text-2xl font-black mt-6 ${themeStyle === 'retro-color' ? 'text-red-700' : 'text-black'}`}>★ 特派記者：{art.name}</span>}
                                                        </div>
                                                        <div className="flex-1">
                                                            {photos.map(p => {
                                                                const layout = articleOverrides[art.id]?.photoLayouts?.[p.id] ?? 'full';
                                                                const layoutClass = { 'full': 'w-full block mb-4', 'left-lg': 'img-float-left w-1/2', 'right-lg': 'img-float-right w-1/2', 'left-sm': 'img-float-left w-1/3', 'right-sm': 'img-float-right w-1/3' }[layout];
                                                                return (
                                                                    <div key={p.id} className={`relative group ${layoutClass}`}>
                                                                        <img src={p.url} className={`object-cover border-2 border-black w-full h-auto ${themeStyle === 'retro-color' ? 'contrast-110 saturate-125' : ''}`}/>
                                                                        <div className="absolute top-1 left-1 opacity-0 group-hover:opacity-100 print:hidden bg-white/95 p-1 rounded-md shadow-lg border border-slate-200 z-10 grid grid-cols-2 gap-1 w-24 backdrop-blur-sm">
                                                                            {['full', 'left-lg', 'right-lg', 'left-sm', 'right-sm'].map(l => (
                                                                                <button key={l} onClick={() => setArticleOverrides(prev => ({...prev, [art.id]: {...(prev[art.id]||{}), photoLayouts: {...((prev[art.id]||{}).photoLayouts||{}), [p.id]: l}}}))} className="text-[8px] bg-slate-100 hover:bg-indigo-100 p-1 rounded font-bold uppercase">{l.replace('-lg', '').replace('-sm','')}</button>
                                                                            ))}
                                                                        </div>
                                                                    </div>
                                                                )
                                                            })}
                                                            <p className={`font-bold leading-relaxed text-justify text-lg ${themeStyle === 'retro-color' ? 'text-slate-800' : 'text-black'}`} style={{ fontFamily: "'Noto Serif TC', serif" }}>{displayContent}</p>
                                                            <div className="mt-6 pt-2 flex justify-end font-black text-xs tracking-widest font-sans clear-both">
                                                                <span className={`text-white px-3 py-1 ${themeStyle === 'retro-color' ? 'bg-red-700 shadow-[4px_4px_0px_0px_rgba(0,0,0,0.2)]' : 'bg-black'}`}>#{art.name}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
