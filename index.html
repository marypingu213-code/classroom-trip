<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶石鑑定室 | 戶外走讀平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .font-serif { font-family: 'Noto Serif TC', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* 實體報紙排版引擎 */
        .paper-wrapper {
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 15mm;
            box-sizing: border-box;
            position: relative;
        }
        .paper-a4 { width: 210mm; min-height: 297mm; margin: 0 auto; }
        .paper-a3 { width: 420mm; min-height: 297mm; margin: 0 auto; } 
        
        .vertical-text { 
            writing-mode: vertical-rl; 
            text-orientation: upright;
            letter-spacing: 0.1em;
        }
        
        /* 關鍵修復：絕對防止列印時文章被從中切斷 */
        .article-card { 
            break-inside: avoid; 
            page-break-inside: avoid;
            -webkit-column-break-inside: avoid;
            margin-bottom: 6mm; 
        }
        .col-span-all { column-span: all; margin-bottom: 10mm; }

        .img-float-left { float: left; margin-right: 4mm; margin-bottom: 2mm; }
        .img-float-right { float: right; margin-left: 4mm; margin-bottom: 2mm; }

        @media print { 
            body { background: white; padding: 0; margin: 0; } 
            .print\:hidden { display: none !important; } 
            /* 強制列印出所有背景色與粗邊框，達到所見即所得 */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .paper-wrapper {
                width: 100% !important;
                min-height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                box-shadow: none !important;
                border: none !important;
            }
            .a3-fold-line { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
        }
      }
    </script>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc } from 'firebase/firestore';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';

        const { useState, useEffect, useRef } = React;

        // ==========================================
        // Firebase 動態初始化 (找回您原本的資料庫)
        // ==========================================
        const MY_FIREBASE_CONFIG = {
            apiKey: "AIzaSyC3zxvUPk1BGS6kTmlaSCRoIQtrDxREXd8",
            authDomain: "tainan-walk-app.firebaseapp.com",
            projectId: "tainan-walk-app",
            storageBucket: "tainan-walk-app.firebasestorage.app",
            messagingSenderId: "129998651381",
            appId: "1:129998651381:web:e4e590897dbc36474a2abc",
            measurementId: "G-1DY86P0Y1Y"
        };
        const GEMINI_API_KEY = ""; 

        let appInstance, authInstance, dbInstance, resolvedAppId;
        try {
            const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : MY_FIREBASE_CONFIG;
            if (config) {
                appInstance = initializeApp(config);
                authInstance = getAuth(appInstance);
                dbInstance = getFirestore(appInstance);
                resolvedAppId = typeof __app_id !== 'undefined' ? __app_id : 'tainan-walk-app';
            }
        } catch (e) {
            console.error("Firebase init error", e);
        }

        // ==========================================
        // 基礎設定與選項
        // ==========================================
        const DEFAULT_LOCATIONS = ['資源班', '南美館', '奇美博物館', '林百貨', '安平古堡', '台灣文學館', '文青麵店', '四草綠色隧道', '府中街', '臺灣銀行'];
        const DEFAULT_TARGETS = ['抓面磚', '顛倒的布幣花磚', 'AI 點餐系統', '萬字紋或菊花', '十三溝面磚', '日本福神臉譜', '竹筍柱或迷宮柱頭', '神桌上的食物', '外國紙幣', '馬賽克桌面', '自己發現的其他東西'];

        const SENSE_OPTIONS = [
            { id: 'see', label: '我看到了', icon: 'Eye', color: 'bg-blue-500', textColor: 'text-blue-600', lightBg: 'bg-blue-50', meta: '長得像' },
            { id: 'touch', label: '我摸到了', icon: 'Hand', color: 'bg-amber-500', textColor: 'text-amber-600', lightBg: 'bg-amber-50', meta: '摸起來像' },
            { id: 'taste', label: '我吃到了', icon: 'Utensils', color: 'bg-red-500', textColor: 'text-red-600', lightBg: 'bg-red-50', meta: '吃起來像' },
            { id: 'hear', label: '我聽到了', icon: 'Ear', color: 'bg-green-500', textColor: 'text-green-600', lightBg: 'bg-green-50', meta: '聽起來像' }
        ];

        const FEELINGS = {
            see: ['好漂亮', '好壯觀', '很特別', '亮亮的', '暗暗的', '看不懂', '太複雜', '太多看不完', '眼花撩亂', '很普通', '很有趣', '很驚喜', '有成就感', '想拍照', '沒興趣'],
            touch: ['軟綿綿', '硬硬的', '刺刺的', '粗粗的', '滑滑的', '冰冰的', '熱熱的', '濕濕的', '黏黏的', '刺痛感', '很有趣', '很驚喜', '很舒服', '想再摸一次', '沒興趣'],
            taste: ['甜甜的', '酸酸的', '辣辣的', '太鹹了', '苦苦的', '脆脆的', 'QQ的', '軟爛的', '香香的', '冰涼的', '很好吃', '沒味道', '想再吃', '很驚喜', '不想吃了'],
            hear: ['好好聽', '很輕快', '很溫柔', '很有節奏', '聽不懂', '好吵/太大聲', '太小聲', '好刺耳', '怪聲音', '很混亂', '很開心', '被嚇到', '想跟著跳', '很舒服', '沒興趣']
        };

        const LucideIcon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide && window.lucide.icons[name]) {
                    containerRef.current.innerHTML = `<i data-custom-icon="${name}"></i>`;
                    window.lucide.createIcons({
                        root: containerRef.current, nameAttr: 'data-custom-icon',
                        icons: { [name]: window.lucide.icons[name] }, attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        const compressImage = (file, callback) => {
            if (!file) return;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    const MAX_SIZE = 800; 
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.7)); 
                };
            };
        };

        // ==========================================
        // 主應用程式
        // ==========================================
        function App() {
            const [isOffline, setIsOffline] = useState(!appInstance);
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home');
            
            const [pageUrl, setPageUrl] = useState('');
            useEffect(() => { setPageUrl(window.location.href.split('#')[0]); }, []);
            
            const [currentMission, setCurrentMission] = useState(null); 
            const [roomCodeInput, setRoomCodeInput] = useState('');
            const [missionSetup, setMissionSetup] = useState({ name: '', date: new Date().toISOString().split('T')[0], code: '', draft: '', locations: [], targets: [] });
            const [isProcessingAI, setIsProcessingAI] = useState(false);

            const [studentName, setStudentName] = useState('');
            const [mode, setMode] = useState('beginner');
            const [tempBegData, setTempBegData] = useState({ see: '', touch: '', taste: '', hear: '', feelings: {}, customFeelings: { see: '', touch: '', taste: '', hear: '' }, photos: { see: null, touch: null, taste: null, hear: null } });
            const [tempAdvRecords, setTempAdvRecords] = useState([{ id: Date.now(), location: '', target: '', sense: '', obs: '', meta: '', feelings: [], customFeeling: '', photo: null }]);
            
            const [showModal, setShowModal] = useState(false);
            const [generatedEssay, setGeneratedEssay] = useState('');
            const [generatedFileName, setGeneratedFileName] = useState('');

            const [activeMic, setActiveMic] = useState(null);
            const activeMicRef = useRef(null);
            useEffect(() => { activeMicRef.current = activeMic; }, [activeMic]);
            const [focusedFeeling, setFocusedFeeling] = useState(null);
            const recognitionRef = useRef(null);

            const [allRecords, setAllRecords] = useState([]);
            const [selectedRecords, setSelectedRecords] = useState([]);
            const [recordPhotos, setRecordPhotos] = useState({});
            
            // 報紙專屬控制狀態
            const [layoutIndex, setLayoutIndex] = useState(0); // 0:雙欄/四欄, 1:單欄/雙欄, 2:頭條放大
            const [themeStyle, setThemeStyle] = useState('retro-color'); 
            const [paperSize, setPaperSize] = useState('A4'); 
            const [newspaperTitle, setNewspaperTitle] = useState('寶石鑑定日報');
            const [newspaperDate, setNewspaperDate] = useState(new Date().toISOString().split('T')[0]);
            const [newspaperTaskLabel, setNewspaperTaskLabel] = useState('TASK: ALL');
            const [articleOverrides, setArticleOverrides] = useState({}); 

            const [editingRecordId, setEditingRecordId] = useState(null);
            const [editingContent, setEditingContent] = useState('');

            // 權限驗證
            useEffect(() => {
                if (!authInstance) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(authInstance, __initial_auth_token);
                        else await signInAnonymously(authInstance);
                    } catch (e) { 
                        console.error("Auth init error:", e);
                        setIsOffline(true);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(authInstance, (u) => { setUser(u); });
                return () => unsubscribe();
            }, []);

            // 資料監聽 (加入時間降冪排序)
            useEffect(() => {
                if (dbInstance && user && !isOffline) {
                    const q = collection(dbInstance, 'artifacts', resolvedAppId, 'public', 'data', 'walk_records');
                    const unsubscribe = onSnapshot(q, (snapshot) => {
                        const recs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        // 強制最新紀錄在最上方
                        recs.sort((a, b) => {
                            const dateA = a.createdAt ? new Date(a.createdAt).getTime() : 0;
                            const dateB = b.createdAt ? new Date(b.createdAt).getTime() : 0;
                            return dateB - dateA;
                        });
                        setAllRecords(recs);
                    }, (e) => { 
                        console.warn("Firestore permission error, switching to offline:", e);
                        setIsOffline(true);
                    });
                    return () => unsubscribe();
                } else if (isOffline) {
                    const stored = JSON.parse(localStorage.getItem('walk_records') || '[]');
                    stored.sort((a, b) => {
                        const dateA = a.createdAt ? new Date(a.createdAt).getTime() : 0;
                        const dateB = b.createdAt ? new Date(b.createdAt).getTime() : 0;
                        return dateB - dateA;
                    });
                    setAllRecords(stored);
                }
            }, [user, isOffline]);

            // 語音邏輯
            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    const recognition = new SpeechRecognition();
                    recognition.continuous = true; recognition.interimResults = false; recognition.lang = 'zh-TW';
                    recognition.onresult = (e) => {
                        let transcript = '';
                        for (let i = e.resultIndex; i < e.results.length; ++i) if (e.results[i].isFinal) transcript += e.results[i][0].transcript;
                        const currentMic = activeMicRef.current;
                        if (currentMic) {
                            const parts = currentMic.split('_');
                            const [m, id, field] = parts;
                            if (m === 'beg') {
                                if (field === 'customFeeling') setTempBegData(prev => ({ ...prev, customFeelings: { ...prev.customFeelings, [id]: (prev.customFeelings[id] || '') + transcript } }));
                                else setTempBegData(prev => ({ ...prev, [id]: (prev[id] || '') + transcript }));
                            } else if (m === 'adv') {
                                setTempAdvRecords(prev => prev.map(r => r.id.toString() === id ? { ...r, [field]: (r[field] || '') + transcript } : r));
                            }
                        }
                    };
                    recognition.onerror = () => setActiveMic(null);
                    recognition.onend = () => setActiveMic(null);
                    recognitionRef.current = recognition;
                }
            }, []);

            const handleMic = (micKey) => {
                if (activeMic === micKey) { recognitionRef.current?.stop(); setActiveMic(null); }
                else { 
                    if (activeMic) recognitionRef.current?.stop(); 
                    setActiveMic(micKey); 
                    setTimeout(() => { try { recognitionRef.current?.start(); } catch(e){} }, 50);
                }
            };

            const speakText = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text.replace('/', '，或者'));
                    utterance.lang = 'zh-TW'; utterance.rate = 0.85;
                    window.speechSynthesis.speak(utterance);
                }
            };

            const processAI = async () => {
                if (!missionSetup.draft.trim()) return;
                setIsProcessingAI(true);
                const prompt = `你是一位專業的教育公關。請根據「教學草稿」處理：1. 潤飾新聞稿。2. 精確提取【地點】與要觀察的【物件項目】。回應JSON：{"polished": "...","locations": ["地點1"...],"targets": ["物件1"...]}`;
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey || GEMINI_API_KEY}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: missionSetup.draft }] }], systemInstruction: { parts: [{ text: prompt }] }, generationConfig: { responseMimeType: "application/json" } })
                    });
                    const data = await res.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text);
                    setMissionSetup(prev => ({ ...prev, locations: result.locations, targets: result.targets }));
                    alert("AI 已經成功提取活動項目！");
                } catch (e) {
                    alert("AI 生成失敗。系統將為您帶入預設地點與項目供您修改。");
                    setMissionSetup(prev => ({ ...prev, locations: ['南美館', '林百貨', '資源班'], targets: ['十三溝面磚', '點餐系統', '抓面磚'] }));
                } finally { setIsProcessingAI(false); }
            };

            const createMission = async () => {
                if (!missionSetup.name || !missionSetup.code) return alert("請填寫任務名稱與任務代碼");
                if (missionSetup.locations.length === 0) return alert("請先手動設定或透過 AI 提取地點與項目");
                const missionData = { code: missionSetup.code, name: missionSetup.name, date: missionSetup.date, locations: missionSetup.locations, targets: missionSetup.targets, createdAt: new Date().toISOString() };
                
                if (dbInstance && !isOffline) {
                    if (!user) return alert("權限尚未準備好，請稍等一秒再試...");
                    try { 
                        await setDoc(doc(dbInstance, 'artifacts', resolvedAppId, 'public', 'data', 'missions', missionData.code), missionData); 
                    } catch (e) { 
                        setIsOffline(true); 
                        const storedMissions = JSON.parse(localStorage.getItem('missions') || '{}'); 
                        storedMissions[missionData.code] = missionData; 
                        localStorage.setItem('missions', JSON.stringify(storedMissions)); 
                    }
                } else {
                    const storedMissions = JSON.parse(localStorage.getItem('missions') || '{}'); 
                    storedMissions[missionData.code] = missionData; 
                    localStorage.setItem('missions', JSON.stringify(storedMissions));
                }
                alert(`開課成功！請請學生輸入任務代碼：${missionData.code}`);
                setView('home');
            };

            const joinMission = async () => {
                if (!roomCodeInput.trim()) return alert("請輸入任務代碼");
                let missionData = null;
                if (dbInstance && !isOffline) {
                    if (!user) return alert("連線中，請稍候...");
                    try { 
                        const docSnap = await getDoc(doc(dbInstance, 'artifacts', resolvedAppId, 'public', 'data', 'missions', roomCodeInput)); 
                        if (docSnap.exists()) missionData = docSnap.data(); 
                    } catch (e) { 
                        setIsOffline(true); 
                        const storedMissions = JSON.parse(localStorage.getItem('missions') || '{}'); 
                        missionData = storedMissions[roomCodeInput]; 
                    }
                } else { 
                    const storedMissions = JSON.parse(localStorage.getItem('missions') || '{}'); 
                    missionData = storedMissions[roomCodeInput]; 
                }
                
                if (missionData) { setCurrentMission(missionData); setView('student_record'); } 
                else { alert("找不到此任務代碼，請確認老師是否已經開課！"); }
            };

            const joinFreeExplore = () => {
                setCurrentMission({ code: 'FREE', name: '自由探索 (免代碼)', locations: DEFAULT_LOCATIONS, targets: DEFAULT_TARGETS, date: new Date().toISOString().split('T')[0] });
                setView('student_record');
            };

            const handlePreview = () => {
                if (!studentName) return alert("請輸入您的姓名");
                let essay = `【作者：${studentName}】\n\n`;
                if (mode === 'beginner') {
                    SENSE_OPTIONS.forEach(s => {
                        const combinedFeelings = [...(tempBegData.feelings[s.id] || [])];
                        if (tempBegData.customFeelings[s.id]) combinedFeelings.push(tempBegData.customFeelings[s.id]);
                        if (tempBegData[s.id] || combinedFeelings.length > 0) essay += `${s.label}「${tempBegData[s.id]}」，感覺「${combinedFeelings.join('、')}」。\n`;
                    });
                } else {
                    tempAdvRecords.forEach((r, idx) => {
                        const combinedFeelings = [...r.feelings];
                        if (r.customFeeling) combinedFeelings.push(r.customFeeling);
                        if (r.target) essay += `（發現 ${idx+1}）在「${r.location}」探索「${r.target}」。透過「${r.sense}」，發現了「${r.obs}」，覺得它「${r.meta}」，心情「${combinedFeelings.join('、')}」。\n\n`;
                    });
                }
                setGeneratedEssay(essay);
                setGeneratedFileName(`${(currentMission?.date || new Date().toISOString().split('T')[0]).replace(/-/g, '')}_${studentName}_${mode === 'beginner' ? '初階' : '進階'}.txt`);
                setShowModal(true);
            };

            const submitRecord = async () => {
                let studentPhotos = [];
                if (mode === 'beginner') Object.values(tempBegData.photos).forEach(url => { if(url) studentPhotos.push(url); });
                else tempAdvRecords.forEach(r => { if(r.photo) studentPhotos.push(r.photo); });
                
                const newRec = { 
                    id: Date.now().toString(), 
                    missionCode: currentMission?.code || 'FREE', 
                    name: studentName, 
                    mode: mode, 
                    content: generatedEssay, 
                    fileName: generatedFileName, 
                    studentPhotos: studentPhotos, 
                    createdAt: new Date().toISOString() 
                };
                
                if (dbInstance && !isOffline) {
                    try { 
                        await setDoc(doc(dbInstance, 'artifacts', resolvedAppId, 'public', 'data', 'walk_records', newRec.id), newRec); 
                    } catch (e) { 
                        setIsOffline(true); 
                        const stored = JSON.parse(localStorage.getItem('walk_records') || '[]'); 
                        localStorage.setItem('walk_records', JSON.stringify([newRec, ...stored])); 
                        setAllRecords(prev => [newRec, ...prev].sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0))); 
                    }
                } else { 
                    const stored = JSON.parse(localStorage.getItem('walk_records') || '[]'); 
                    localStorage.setItem('walk_records', JSON.stringify([newRec, ...stored])); 
                    setAllRecords(prev => [newRec, ...prev].sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0))); 
                }
                
                alert("紀錄已成功送出！");
                setStudentName('');
                setTempBegData({ see: '', touch: '', taste: '', hear: '', feelings: {}, customFeelings: { see: '', touch: '', taste: '', hear: '' }, photos: { see: null, touch: null, taste: null, hear: null } });
                setTempAdvRecords([{ id: Date.now(), location: currentMission?.locations?.[0] || DEFAULT_LOCATIONS[0], target: '', sense: '', obs: '', meta: '', feelings: [], customFeeling: '', photo: null }]);
                setShowModal(false);
                setView('home');
            };

            const enterDashboard = () => {
                if (!roomCodeInput.trim()) return alert("請輸入任務代碼");
                setCurrentMission({ code: roomCodeInput }); 
                setNewspaperTaskLabel(`TASK: ${roomCodeInput}`);
                setView('teacher_dashboard');
            };
            
            const enterDashboardAll = () => { 
                setCurrentMission({ code: 'ALL', name: '所有紀錄' }); 
                setNewspaperTaskLabel('TASK: ALL');
                setView('teacher_dashboard'); 
            };

            const saveEdit = async (id) => {
                if (dbInstance && !isOffline) {
                    try { await updateDoc(doc(dbInstance, 'artifacts', resolvedAppId, 'public', 'data', 'walk_records', id), { content: editingContent }); } 
                    catch (e) { updateLocalRecord(id, editingContent); setIsOffline(true); }
                } else { updateLocalRecord(id, editingContent); }
                setEditingRecordId(null);
            };
            
            const updateLocalRecord = (id, newContent) => {
                const stored = JSON.parse(localStorage.getItem('walk_records') || '[]');
                const updated = stored.map(r => r.id === id ? { ...r, content: newContent } : r);

                                                                            <button onClick={() => setArticleOverrides(prev => ({...prev, [art.id]: {...(prev[art.id]||{}), photoLayouts: {...((prev[art.id]||{}).photoLayouts||{}), [p.id]: 'right-lg'}}}))} className="text-[10px] bg-slate-100 hover:bg-indigo-100 px-1 py-1 rounded font-bold w-[48%]">右大</button>
                                                                            <button onClick={() => setArticleOverrides(prev => ({...prev, [art.id]: {...(prev[art.id]||{}), photoLayouts: {...((prev[art.id]||{}).photoLayouts||{}), [p.id]: 'left-sm'}}}))} className="text-[10px] bg-slate-100 hover:bg-indigo-100 px-1 py-1 rounded font-bold w-[48%]">左小</button>
                                                                            <button onClick={() => setArticleOverrides(prev => ({...prev, [art.id]: {...(prev[art.id]||{}), photoLayouts: {...((prev[art.id]||{}).photoLayouts||{}), [p.id]: 'right-sm'}}}))} className="text-[10px] bg-slate-100 hover:bg-indigo-100 px-1 py-1 rounded font-bold w-[48%]">右小</button>
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })}
                                                            
                                                            <p className={`text-slate-700 leading-relaxed font-sans ${isSpanAll ? 'text-lg' : 'text-sm'} whitespace-pre-wrap text-justify clear-none`}>{displayContent}</p>
                                                            
                                                            <div className="mt-5 pt-3 border-t border-slate-200 flex justify-end items-center italic text-xs text-slate-400 font-sans clear-both"><span>#{art.name || art.studentName}</span></div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ) : (
                                        /* 復古風格紙本報紙 (黑白/彩色) */
                                        <div>
                                            <div className={`border-t-[12px] border-b-4 border-black border-double py-6 mb-8 flex justify-between items-end col-span-all ${isColor ? 'border-t-red-700 border-b-red-700' : ''}`}>
                                                <div className="flex flex-col">
                                                    <span className="text-black font-black text-xs md:text-sm tracking-[0.3em] mb-2 px-1 font-sans">
                                                        中華民國 {rocYear} 年 {month} 月 {day} 日
                                                    </span>
                                                    <h1 className={`font-black tracking-tight leading-none whitespace-pre-wrap ${isColor ? 'text-red-700' : 'text-black'} ${newspaperTitleSize}`} style={{ fontFamily: "'Noto Serif TC', serif" }}>
                                                        {newspaperTitle}
                                                    </h1>
                                                </div>
                                                <div className={`text-right border-l-4 pl-4 pb-1 shrink-0 ${isColor ? 'border-red-700' : 'border-black'}`}>
                                                    <p className="text-black font-black text-sm tracking-widest uppercase mb-1">{newspaperTaskLabel}</p>
                                                    <p className="text-black font-bold text-xs mb-3">走讀任務第一版</p>
                                                    <div className="h-8 w-24 flex gap-[2px] ml-auto">
                                                        {Array.from({length: 15}).map((_, i) => <div key={i} className={`h-full bg-black ${i % 3 === 0 ? 'w-1.5' : i % 5 === 0 ? 'w-1' : 'w-0.5'}`}></div>)}
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="news-columns">
                                                {articles.map((art, idx) => {
                                                    const stuPhotos = (art.studentPhotos || []).map((url, i) => ({ id: `stu_${i}`, url, selected: true }));
                                                    const teaPhotos = (recordPhotos[art.id] || []).filter(p => p.selected);
                                                    const photos = [...stuPhotos, ...teaPhotos];

                                                    const defaultTitle = `【${art.name || art.studentName}】的觀察紀錄`;
                                                    const currentTitle = articleOverrides[art.id]?.title ?? defaultTitle;
                                                    const isSpanAll = articleOverrides[art.id]?.spanAll ?? (layoutIndex === 2 && idx === 0);
                                                    const defaultTitleSize = isSpanAll ? 'text-4xl' : 'text-2xl';
                                                    const currentTitleSize = articleOverrides[art.id]?.titleSize ?? defaultTitleSize;

                                                    const contentStr = art.content || art.essay || '';
                                                    let displayContent = contentStr;
                                                    if (displayContent.startsWith('【作者：')) {
                                                        const parts = displayContent.split('\n\n');
                                                        if (parts.length > 1) displayContent = parts.slice(1).join('\n\n');
                                                    }

                                                    return (
                                                        <div key={art.id} className={`article-card bg-transparent border-b-2 border-black pb-6 relative ${isSpanAll ? 'col-span-all border-b-4 border-black mb-8' : ''}`}>
                                                            
                                                            <div className="print:hidden absolute -top-10 left-0 bg-indigo-50 border border-indigo-100 rounded-lg p-1.5 flex gap-2 items-center text-[10px] shadow-sm opacity-50 hover:opacity-100 transition-opacity z-50">
                                                                <LucideIcon name="Settings" size={16} className="text-indigo-400" />
                                                                <input type="text" value={currentTitle} onChange={e => setArticleOverrides(p => ({...p, [art.id]: {...(p[art.id]||{}), title: e.target.value}}))} className="px-2 py-0.5 rounded border border-indigo-100 w-28 font-bold text-slate-700" placeholder="自訂標題..." />
                                                                <select value={currentTitleSize} onChange={e => setArticleOverrides(p => ({...p, [art.id]: {...(p[art.id]||{}), titleSize: e.target.value}}))} className="rounded border border-indigo-100 font-bold text-slate-700">
                                                                    <option value="text-xl">XL</option><option value="text-2xl">2XL</option><option value="text-3xl">3XL</option><option value="text-4xl">4XL</option><option value="text-5xl">5XL</option><option value="text-6xl">6XL</option><option value="text-7xl">7XL</option>
                                                                </select>
                                                                <button onClick={() => setArticleOverrides(p => ({...p, [art.id]: {...(p[art.id]||{}), spanAll: !isSpanAll}}))} className={`px-2 py-0.5 rounded font-black ${isSpanAll ? 'bg-indigo-600 text-white' : 'text-indigo-600'}`}>{isSpanAll ? '橫跨中' : '跨全版'}</button>
                                                            </div>

                                                            <div className={`flex ${isSpanAll ? 'flex-row-reverse gap-8' : 'flex-col gap-4'}`}>
                                                                
                                                                <div className={`shrink-0 ${isSpanAll ? 'border-l-4 border-black pl-6 flex items-start' : 'border-b-2 border-black pb-2'}`}>
                                                                    <h2 className={`font-black font-serif leading-tight ${isSpanAll ? 'vertical-text max-h-96' : ''} ${currentTitleSize} ${isColor ? 'text-blue-900' : 'text-black'}`}>
                                                                        {currentTitle}
                                                                    </h2>
                                                                    {isSpanAll && <span className={`vertical-text text-2xl font-black mt-4 ${isColor ? 'text-red-600' : 'text-black'}`}>★ 特派記者</span>}
                                                                </div>
                                                                
                                                                <div className="flex-1">
                                                                    {photos.map(p => {
                                                                        const layout = articleOverrides[art.id]?.photoLayouts?.[p.id] ?? 'full';
                                                                        const layoutClass = { 'full': 'w-full block mb-4', 'left-lg': 'img-float-left w-1/2', 'right-lg': 'img-float-right w-1/2', 'left-sm': 'img-float-left w-1/3', 'right-sm': 'img-float-right w-1/3', 'hidden': 'hidden' }[layout];
                                                                        return (
                                                                            <div key={p.id} className={`relative group ${layoutClass}`}>
                                                                                <img src={p.url} className={`${!isColor ? 'grayscale contrast-125' : 'contrast-110 saturate-125'} object-cover border-2 border-black w-full h-auto`}/>
                                                                                <div className="absolute top-1 left-1 opacity-0 group-hover:opacity-100 print:hidden bg-white/95 p-1 rounded-md shadow-lg border border-slate-200 z-10 grid grid-cols-2 gap-1 w-24 backdrop-blur-sm">
                                                                                    <button onClick={() => setArticleOverrides(prev => ({...prev, [art.id]: {...(prev[art.id]||{}), photoLayouts: {...((prev[art.id]||{}).photoLayouts||{}), [p.id]: 'full'}}}))} className="text-[10px] bg-slate-100 hover:bg-indigo-100 px-1 py-1 rounded font-bold w-full col-span-2">滿版</button>
                                                                                    <button onClick={() => setArticleOverrides(prev => ({...prev, [art.id]: {...(prev[art.id]||{}), photoLayouts: {...((prev[art.id]||{}).photoLayouts||{}), [p.id]: 'left-lg'}}}))} className="text-[10px] bg-slate-100 hover:bg-indigo-100 px-1 py-1 rounded font-bold">左大</button>
                                                                                    <button onClick={() => setArticleOverrides(prev => ({...prev, [art.id]: {...(prev[art.id]||{}), photoLayouts: {...((prev[art.id]||{}).photoLayouts||{}), [p.id]: 'right-lg'}}}))} className="text-[10px] bg-slate-100 hover:bg-indigo-100 px-1 py-1 rounded font-bold">右大</button>
                                                                                    <button onClick={() => setArticleOverrides(prev => ({...prev, [art.id]: {...(prev[art.id]||{}), photoLayouts: {...((prev[art.id]||{}).photoLayouts||{}), [p.id]: 'left-sm'}}}))} className="text-[10px] bg-slate-100 hover:bg-indigo-100 px-1 py-1 rounded font-bold">左小</button>
                                                                                    <button onClick={() => setArticleOverrides(prev => ({...prev, [art.id]: {...(prev[art.id]||{}), photoLayouts: {...((prev[art.id]||{}).photoLayouts||{}), [p.id]: 'right-sm'}}}))} className="text-[10px] bg-slate-100 hover:bg-indigo-100 px-1 py-1 rounded font-bold">右小</button>
                                                                                </div>
                                                                            </div>
                                                                        )
                                                                    })}
                                                                    <p className={`font-bold leading-relaxed text-justify ${isSpanAll ? 'text-lg' : 'text-sm'} ${isColor ? 'text-slate-900' : 'text-black'}`} style={{ fontFamily: "'Noto Serif TC', serif" }}>
                                                                        {displayContent}
                                                                    </p>
                                                                    <div className="mt-4 pt-2 flex justify-end font-black text-[10px] uppercase tracking-widest font-sans clear-both">
                                                                        <span className={`text-white px-2 py-0.5 ${isColor ? 'bg-red-700' : 'bg-black'}`}>#{art.name || art.studentName}</span>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // 輔助視圖
            if (view === 'teacher_create') return <TeacherCreateView setView={setView} missionSetup={missionSetup} setMissionSetup={setMissionSetup} processAI={processAI} isProcessingAI={isProcessingAI} createMission={createMission} />;
            if (view === 'student_join') return <StudentJoinView setView={setView} roomCodeInput={roomCodeInput} setRoomCodeInput={setRoomCodeInput} joinMission={joinMission} studentName={studentName} setStudentName={setStudentName} />;
            if (view === 'teacher_login') return <TeacherLoginView setView={setView} roomCodeInput={roomCodeInput} setRoomCodeInput={setRoomCodeInput} enterDashboard={enterDashboard} />;
            
            return null;
        }

        const TeacherCreateView = ({ setView, missionSetup, setMissionSetup, processAI, isProcessingAI, createMission }) => (
            <div className="max-w-4xl mx-auto p-6">
                <button onClick={() => setView('home')} className="mb-6 flex items-center text-slate-500 hover:text-indigo-600 font-bold"><LucideIcon name="ArrowLeft" className="mr-2"/> 返回首頁</button>
                <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 mb-8">
                    <h2 className="text-3xl font-black text-slate-800 mb-6 flex items-center"><LucideIcon name="PenTool" className="mr-3 text-emerald-600" size={32}/> 新增走讀任務</h2>
                    <div className="grid md:grid-cols-3 gap-4 mb-6">
                        <div><label className="block text-sm font-bold text-slate-500 mb-2">任務名稱</label><input type="text" value={missionSetup.name} onChange={e=>setMissionSetup({...missionSetup, name: e.target.value})} placeholder="例：林百貨走讀" className="w-full bg-slate-50 p-4 rounded-xl border focus:border-indigo-500 outline-none font-bold" /></div>
                        <div><label className="block text-sm font-bold text-slate-500 mb-2">任務代碼 (供學生加入)</label><input type="text" value={missionSetup.code} onChange={e=>setMissionSetup({...missionSetup, code: e.target.value})} placeholder="例：0422" className="w-full bg-slate-50 p-4 rounded-xl border focus:border-indigo-500 outline-none font-black text-indigo-600 uppercase" /></div>
                        <div><label className="block text-sm font-bold text-slate-500 mb-2">日期</label><input type="date" value={missionSetup.date} onChange={e=>setMissionSetup({...missionSetup, date: e.target.value})} className="w-full bg-slate-50 p-4 rounded-xl border focus:border-indigo-500 outline-none font-bold" /></div>
                    </div>
                    <div className="mb-6">
                        <label className="block text-sm font-bold text-slate-500 mb-2">輸入教學計畫 (前置：讓 AI 幫您提取探索項目)</label>
                        <textarea value={missionSetup.draft} onChange={e=>setMissionSetup({...missionSetup, draft: e.target.value})} className="w-full h-32 bg-slate-50 p-4 rounded-xl border focus:border-indigo-500 outline-none" placeholder="貼上您的教學草稿..."></textarea>
                        <button onClick={processAI} disabled={isProcessingAI || !missionSetup.draft} className="mt-3 bg-slate-800 text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center w-full md:w-auto hover:bg-slate-900 disabled:bg-slate-300 transition-colors">
                            {isProcessingAI ? <LucideIcon name="RefreshCw" className="animate-spin mr-2"/> : <LucideIcon name="Sparkles" className="mr-2"/>} 透過 AI 提取地點與項目
                        </button>
                    </div>
                    {missionSetup.locations.length > 0 && (
                        <div className="bg-emerald-50 p-6 rounded-2xl mb-8 border border-emerald-100">
                            <p className="font-bold text-emerald-800 mb-3">✅ 已確認以下探索清單：</p>
                            <div className="flex flex-wrap gap-2 mb-4">{missionSetup.locations.map(l => <span key={l} className="bg-white px-3 py-1 rounded-lg text-sm border shadow-sm">📍 {l}</span>)}</div>
                            <div className="flex flex-wrap gap-2">{missionSetup.targets.map(t => <span key={t} className="bg-white px-3 py-1 rounded-lg text-sm border shadow-sm font-bold text-indigo-600">🔍 {t}</span>)}</div>
                        </div>
                    )}
                    <button onClick={createMission} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xl hover:bg-indigo-700 shadow-xl shadow-indigo-200 transition-transform active:scale-95">確定開課</button>
                </div>
            </div>
        );

        const StudentJoinView = ({ setView, roomCodeInput, setRoomCodeInput, joinMission, studentName, setStudentName }) => (
            <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-indigo-600">
                <button onClick={() => setView('home')} className="absolute top-6 left-6 text-white/70 hover:text-white font-bold flex items-center transition-colors"><LucideIcon name="ArrowLeft" className="mr-2"/> 返回</button>
                <div className="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-md text-center">
                    <div className="bg-indigo-100 text-indigo-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"><LucideIcon name="Key" size={40}/></div>
                    <h2 className="text-3xl font-black text-slate-800 mb-2">加入任務</h2>
                    <p className="text-slate-500 mb-8">請輸入老師給您的任務代碼</p>
                    <input type="text" value={roomCodeInput} onChange={e=>setRoomCodeInput(e.target.value.toUpperCase())} placeholder="任務代碼" className="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl p-5 text-center text-3xl font-black text-indigo-600 mb-4 uppercase tracking-widest focus:border-indigo-500 outline-none transition-colors" />
                    <button onClick={joinMission} className="w-full bg-slate-800 text-white py-5 rounded-2xl font-black text-xl hover:bg-slate-900 shadow-xl transition-transform active:scale-95">進入教室</button>
                </div>
            </div>
        );

        const TeacherLoginView = ({ setView, roomCodeInput, setRoomCodeInput, enterDashboard }) => (
            <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-amber-50">
                <button onClick={() => setView('home')} className="absolute top-6 left-6 text-amber-800/60 hover:text-amber-800 font-bold flex items-center transition-colors"><LucideIcon name="ArrowLeft" className="mr-2"/> 返回</button>
                <div className="bg-white p-10 rounded-[2rem] shadow-xl w-full max-w-md text-center border border-amber-100">
                    <div className="bg-amber-100 text-amber-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"><LucideIcon name="Database" size={40}/></div>
                    <h2 className="text-3xl font-black text-slate-800 mb-2">進入老師後台</h2>
                    <p className="text-slate-500 mb-8">請輸入您開課時的任務代碼</p>
                    <input type="text" value={roomCodeInput} onChange={e=>setRoomCodeInput(e.target.value.toUpperCase())} placeholder="任務代碼" className="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl p-5 text-center text-3xl font-black text-amber-600 mb-6 uppercase tracking-widest focus:border-amber-500 outline-none transition-colors" />
                    <button onClick={enterDashboard} className="w-full bg-amber-500 text-white py-5 rounded-2xl font-black text-xl hover:bg-amber-600 shadow-xl transition-transform active:scale-95">查看學生成果</button>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
